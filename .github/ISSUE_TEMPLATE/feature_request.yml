name: Feature request
description: Propose a focused improvement to Graphite
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or missing graph workflow should Graphite solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Include a concise Java, Kotlin, Scala, or configuration example when possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain current workarounds and why they are insufficient.
    validations:
      required: true
  - type: dropdown
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - Additive
        - Potentially breaking
        - Unknown
    validations:
      required: true
