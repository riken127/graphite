name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Java ${{ matrix.java }} / Neo4j ${{ matrix.neo4j }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - java: "21"
            neo4j: neo4j:5.26-community
          - java: "21"
            neo4j: neo4j:2026.06.0
          - java: "25"
            neo4j: neo4j:2026.06.0
    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
          cache-dependency-path: |
            pom.xml
            **/pom.xml
            .mvn/wrapper/maven-wrapper.properties
      - name: Verify reactor
        run: >-
          ./mvnw --batch-mode --no-transfer-progress
          -Dgraphite.requireDocker=true
          -Dgraphite.neo4j.image=${{ matrix.neo4j }}
          clean verify
      - name: Upload coverage reports
        if: ${{ always() && hashFiles('graphite-*/target/site/jacoco/jacoco.xml') != '' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-java-${{ matrix.java }}-${{ strategy.job-index }}
          path: graphite-*/target/site/jacoco/
          if-no-files-found: error
          retention-days: 14

  consumers:
    name: External consumers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: |
            pom.xml
            **/pom.xml
            .mvn/wrapper/maven-wrapper.properties
      - name: Install reactor artifacts
        run: >-
          ./mvnw --batch-mode --no-transfer-progress
          -DskipTests -Djacoco.skip=true install
      - name: Compile external consumers
        run: >-
          ./mvnw --batch-mode --no-transfer-progress
          -f consumer-tests/pom.xml verify

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Review dependency changes
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4.8.3
        with:
          fail-on-severity: moderate
